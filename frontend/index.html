<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Farm Labour Manager</title>
    <link rel="manifest" href="manifest.json">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .tab-content { display: none; animation: fadeIn 0.3s ease-in-out; }
        .tab-content.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-gray-100 text-gray-800 font-sans pb-20">

    <div class="bg-gradient-to-r from-green-800 to-green-900 text-white p-5 shadow-xl flex justify-between items-center rounded-b-2xl mb-4">
        <h1 class="text-2xl font-extrabold tracking-wide">🌾 FarmManager</h1>
        <button onclick="installPWA()" id="installBtn" class="hidden bg-white text-green-800 px-4 py-1 rounded-full font-bold shadow-md text-sm transition hover:bg-gray-100">Install App</button>
    </div>

    <div class="max-w-3xl mx-auto px-4">
        
        <div class="flex space-x-2 bg-white p-2 rounded-xl shadow-md mb-5 overflow-x-auto">
            <button onclick="switchTab('tab-admin')" id="btn-admin" class="flex-1 py-2 px-3 rounded-lg font-bold text-sm bg-green-100 text-green-800 transition">⚙️ Admin</button>
            <button onclick="switchTab('tab-alltime')" id="btn-alltime" class="flex-1 py-2 px-3 rounded-lg font-bold text-sm text-gray-500 hover:bg-gray-100 transition">👷‍♂️ All-Time</button>
            <button onclick="switchTab('tab-occasional')" id="btn-occasional" class="flex-1 py-2 px-3 rounded-lg font-bold text-sm text-gray-500 hover:bg-gray-100 transition">🌾 Occasional</button>
        </div>

        <div id="searchFilters" class="hidden flex gap-2 mb-4">
            <input type="text" id="searchWorker" onkeyup="renderLabours()" placeholder="🔍 Search worker name..." class="border-2 border-gray-200 p-3 rounded-xl w-full shadow-sm focus:border-green-500 outline-none text-lg">
            <select id="filterYear" onchange="loadData()" class="border-2 border-gray-200 p-3 rounded-xl shadow-sm bg-white font-bold text-green-700 focus:border-green-500 outline-none">
                <option value="all">All Years</option>
                <option value="2026">2026</option>
                <option value="2025">2025</option>
                <option value="2024">2024</option>
            </select>
        </div>

        <!-- Global Filters with Fully Synced Dual Calendars -->
        <div id="globalFilters" class="hidden bg-white border-2 border-yellow-300 p-4 rounded-2xl shadow-lg mb-6">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
                <!-- English Calendar -->
                <div>
                    <label class="block text-sm font-extrabold text-gray-700 mb-1">📅 English Date</label>
                    <input type="date" id="attendanceDate" onchange="syncFromEnglish(); loadData();" class="border-2 border-gray-300 p-2 rounded-lg w-full bg-gray-50 text-lg font-bold shadow-inner">
                </div>
                <!-- Bengali Calendar -->
                <div>
                    <label class="block text-sm font-extrabold text-red-800 mb-1">🗓️ Bengali Date (Bangabda)</label>
                    <div class="flex gap-1">
                        <select id="bengaliDay" onchange="syncFromBengali(); loadData();" class="border-2 border-red-200 p-2 rounded-lg bg-red-50 font-bold text-red-900 w-1/4 shadow-inner"></select>
                        <select id="bengaliMonth" onchange="syncFromBengali(); loadData();" class="border-2 border-red-200 p-2 rounded-lg bg-red-50 font-bold text-red-900 w-2/4 shadow-inner">
                            <option value="1">Baishakh</option><option value="2">Jyeshtha</option>
                            <option value="3">Ashadh</option><option value="4">Shraban</option>
                            <option value="5">Bhadra</option><option value="6">Ashwin</option>
                            <option value="7">Kartik</option><option value="8">Agrahayan</option>
                            <option value="9">Poush</option><option value="10">Magh</option>
                            <option value="11">Falgun</option><option value="12">Chaitra</option>
                        </select>
                        <input type="number" id="bengaliYear" onchange="syncFromBengali(); loadData();" class="border-2 border-red-200 p-2 rounded-lg bg-red-50 font-bold text-red-900 w-1/4 shadow-inner" placeholder="Year">
                    </div>
                </div>
            </div>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
                <div>
                    <label class="block text-sm font-extrabold text-blue-800 mb-1">👷‍♂️ Apply All-Time Mode</label>
                    <select id="allTimeMode" class="border-2 border-blue-200 p-2 rounded-lg w-full bg-blue-50 font-bold text-blue-900">
                        <option value="non_harvest">Normal Day</option>
                        <option value="harvest">Harvest Day</option>
                    </select>
                </div>
                <div>
                    <label class="block text-sm font-extrabold text-orange-800 mb-1">🌾 Apply Occasional Season</label>
                    <select id="attendanceSeason" class="border-2 border-orange-200 p-2 rounded-lg w-full bg-orange-50 font-bold text-orange-900">
                        <option value="none">None</option>
                        <option value="boro_chas">Boro Chas</option>
                        <option value="boro_harvest">Boro Harvest</option>
                        <option value="borsa_chas">Borsa Chas</option>
                        <option value="borsa_harvest">Borsa Harvest</option>
                    </select>
                </div>
            </div>
            <p class="text-xs text-gray-500 mt-2 text-center font-bold">⚠️ Dropdowns above apply to NEW attendance marks. Button colors below show what is ALREADY saved.</p>
        </div>

        <!-- TAB 1: ADMIN -->
        <div id="tab-admin" class="tab-content active">
            <div class="bg-white p-5 rounded-2xl shadow-lg mb-6 border-t-8 border-gray-800">
                <h2 class="font-bold text-xl mb-3 text-gray-800">➕ Add New Worker</h2>
                <div class="flex flex-col gap-3">
                    <input type="text" id="newLabourName" placeholder="Worker Full Name" class="border-2 border-gray-200 p-3 rounded-lg w-full text-lg focus:border-gray-800 outline-none">
                    <div class="flex gap-2">
                        <select id="newLabourType" class="border-2 border-gray-200 p-3 rounded-lg flex-1 text-lg font-bold text-gray-700">
                            <option value="all_time">All-Time Worker</option>
                            <option value="occasional">Occasional Worker</option>
                        </select>
                        <button onclick="addLabour()" class="bg-gray-800 hover:bg-gray-900 text-white px-8 py-3 rounded-lg font-bold shadow-md transition text-lg">Add</button>
                    </div>
                </div>
            </div>

            <h2 class="font-extrabold text-2xl mb-4 text-gray-800 ml-1">⚙️ Set Daily Rates</h2>

            <!-- ALL TIME CONFIG -->
            <div class="bg-blue-50 p-5 rounded-2xl shadow-md mb-5 border-2 border-blue-200">
                <div class="flex justify-between items-center mb-4">
                    <h3 class="font-extrabold text-xl text-blue-900">👷‍♂️ All-Time Rates</h3>
                    <select id="configAllTimeMode" onchange="swapAllTimeConfigInputs()" class="border-2 border-blue-300 p-2 rounded-lg bg-white font-bold text-blue-700 outline-none">
                        <option value="non_harvest">Normal Day</option>
                        <option value="harvest">Harvest Day</option>
                    </select>
                </div>
                <div class="flex gap-4 mb-4">
                    <div class="flex-1">
                        <label class="block text-sm font-extrabold text-blue-700 uppercase">Wage (₹)</label>
                        <input type="number" id="configAllTimeWage" class="border-2 border-blue-200 p-3 rounded-lg w-full mt-1 text-xl font-bold">
                    </div>
                    <div class="flex-1">
                        <label class="block text-sm font-extrabold text-blue-700 uppercase">Rice (Kg)</label>
                        <input type="number" id="configAllTimeRice" class="border-2 border-blue-200 p-3 rounded-lg w-full mt-1 text-xl font-bold">
                    </div>
                </div>
                <button onclick="saveAllTimeRates()" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-3 rounded-lg w-full font-extrabold shadow-md transition text-lg">Save All-Time Rates</button>
            </div>
            
            <!-- OCCASIONAL CONFIG -->
            <div class="bg-orange-50 p-5 rounded-2xl shadow-md mb-6 border-2 border-orange-200">
                <h3 class="font-extrabold text-xl text-orange-900 mb-4">🌾 Occasional Rates</h3>
                <div class="flex gap-4 mb-4">
                    <div class="flex-1">
                        <label class="block text-sm font-extrabold text-orange-700 uppercase">Wage (₹)</label>
                        <input type="number" id="configOccasionalWage" class="border-2 border-orange-200 p-3 rounded-lg w-full mt-1 text-xl font-bold">
                    </div>
                    <div class="flex-1">
                        <label class="block text-sm font-extrabold text-orange-700 uppercase">Rice (Kg)</label>
                        <input type="number" id="configOccasionalRice" class="border-2 border-orange-200 p-3 rounded-lg w-full mt-1 text-xl font-bold">
                    </div>
                </div>
                <button onclick="saveOccasionalRates()" class="bg-orange-600 hover:bg-orange-700 text-white px-4 py-3 rounded-lg w-full font-extrabold shadow-md transition text-lg">Save Occasional Rates</button>
            </div>
        </div>

        <div id="tab-alltime" class="tab-content"><div id="list-alltime"></div></div>
        <div id="tab-occasional" class="tab-content"><div id="list-occasional"></div></div>
    </div>

    <script>
        const API_URL = "https://labour-management-gopa.onrender.com/api"; 
        let allLabours = [];
        let globalConfig = {}; 

        // --- CALENDAR LOGIC (Includes Bengali Year Sync) ---
        function initCalendars() {
            const daySelect = document.getElementById('bengaliDay');
            for(let i=1; i<=31; i++) { daySelect.innerHTML += `<option value="${i}">${i}</option>`; }
            document.getElementById('attendanceDate').valueAsDate = new Date();
            syncFromEnglish();
        }

        function syncFromEnglish() {
            const engDate = new Date(document.getElementById('attendanceDate').value);
            const eYear = engDate.getFullYear();
            const eMonth = engDate.getMonth(); // 0 = Jan
            const eDay = engDate.getDate();

            // Calculate Bengali Year (Switches exactly at mid-April)
            let bYear = eYear - 593;
            if (eMonth < 3 || (eMonth === 3 && eDay < 14)) { bYear = eYear - 594; }

            // Calculate Bengali Month & Day
            let bMonth = eMonth - 3; 
            if (bMonth < 0) bMonth += 12;
            let bDayTemp = eDay - 13;
            if (bDayTemp <= 0) { bMonth = (bMonth - 1 + 12) % 12; bDayTemp += 30; }
            
            document.getElementById('bengaliYear').value = bYear;
            document.getElementById('bengaliMonth').value = bMonth + 1;
            document.getElementById('bengaliDay').value = bDayTemp;
        }

        function syncFromBengali() {
            const bYear = parseInt(document.getElementById('bengaliYear').value) || 1430;
            const bMonth = parseInt(document.getElementById('bengaliMonth').value) - 1;
            const bDay = parseInt(document.getElementById('bengaliDay').value);
            
            // Convert back to English
            let eMonth = (bMonth + 3) % 12;
            let eYear = (bMonth >= 9) ? bYear + 594 : bYear + 593; // Magh, Falgun, Chaitra cross the English Year
            let eDay = bDay + 13;
            if (eDay > 30) { eMonth = (eMonth + 1) % 12; eDay -= 30; }
            
            const eDate = new Date(eYear, eMonth, eDay);
            document.getElementById('attendanceDate').valueAsDate = eDate;
        }
        // ----------------------------------------------------------------

        function switchTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('[id^="btn-"]').forEach(b => {
                b.classList.remove('bg-green-100', 'text-green-800'); b.classList.add('text-gray-500');
            });
            document.getElementById(tabId).classList.add('active');
            const btnId = tabId.replace('tab-', 'btn-');
            document.getElementById(btnId).classList.remove('text-gray-500');
            document.getElementById(btnId).classList.add('bg-green-100', 'text-green-800');

            const filters = document.getElementById('globalFilters');
            const searchUI = document.getElementById('searchFilters');
            if (tabId === 'tab-admin') { filters.classList.add('hidden'); searchUI.classList.add('hidden'); } 
            else { filters.classList.remove('hidden'); searchUI.classList.remove('hidden'); }
        }

        async function loadData() {
            try {
                const confRes = await fetch(`${API_URL}/config`);
                globalConfig = await confRes.json();
                swapAllTimeConfigInputs();
                document.getElementById('configOccasionalWage').value = globalConfig.occasional_wage || 0;
                document.getElementById('configOccasionalRice').value = globalConfig.occasional_rice || 0;

                const year = document.getElementById('filterYear').value;
                const date = document.getElementById('attendanceDate').value;
                const labRes = await fetch(`${API_URL}/labours?year=${year}&date=${date}`);
                allLabours = await labRes.json();
                
                // DYNAMIC MODE DROPDOWN UPDATE
                const allTimeWorker = allLabours.find(l => l.type === 'all_time' && l.current_mode !== 'none');
                if(allTimeWorker) { document.getElementById('allTimeMode').value = allTimeWorker.current_mode; }

                renderLabours();
            } catch (err) { console.log("Waiting for connection..."); }
        }

        function swapAllTimeConfigInputs() {
            const mode = document.getElementById('configAllTimeMode').value;
            if (mode === 'harvest') {
                document.getElementById('configAllTimeWage').value = globalConfig.all_time_wage_harvest || 0;
                document.getElementById('configAllTimeRice').value = globalConfig.all_time_rice_harvest || 0;
            } else {
                document.getElementById('configAllTimeWage').value = globalConfig.all_time_wage_non_harvest || 0;
                document.getElementById('configAllTimeRice').value = globalConfig.all_time_rice_non_harvest || 0;
            }
        }

        function renderLabours() {
            const searchTerm = document.getElementById('searchWorker').value.toLowerCase();
            const filteredLabours = allLabours.filter(l => l.name.toLowerCase().includes(searchTerm));
            
            const allTime = filteredLabours.filter(l => l.type === 'all_time');
            const occasional = filteredLabours.filter(l => l.type === 'occasional');

            document.getElementById('list-alltime').innerHTML = allTime.map(createLabourCard).join('') || '<p class="text-center text-gray-500 mt-10">No workers found.</p>';
            document.getElementById('list-occasional').innerHTML = occasional.map(createLabourCard).join('') || '<p class="text-center text-gray-500 mt-10">No workers found.</p>';
        }

        function createLabourCard(l) {
            const isAllTime = l.type === 'all_time';
            const color = isAllTime ? 'blue' : 'orange';
            
            let daysText = `🗓️ ${l.days_worked} Days Present`;
            if (isAllTime) { daysText = `🗓️ ${l.days_worked} Days (🌾 ${l.harvest_days} Harvest | 🚜 ${l.non_harvest_days} Normal)`; }

            const isPresent = l.current_status === 'present';
            const isAbsent = l.current_status === 'absent';
            
            let presentBtnLabel = "✔️ Mark Present";
            if (isPresent) {
                if (isAllTime && l.current_mode === 'harvest') presentBtnLabel = "✔️ Present (Harvest)";
                else if (isAllTime && l.current_mode === 'non_harvest') presentBtnLabel = "✔️ Present (Normal)";
                else if (!isAllTime && l.current_season !== 'none') presentBtnLabel = `✔️ Present (${l.current_season.replace('_', ' ')})`;
                else presentBtnLabel = "✔️ Present";
            }

            const btnPresent = isPresent ? "bg-green-700 text-white shadow-inner scale-95 border-2 border-green-900" : "bg-white text-green-700 border-2 border-green-300 hover:bg-green-50 shadow-sm";
            const btnAbsent = isAbsent ? "bg-red-700 text-white shadow-inner scale-95 border-2 border-red-900" : "bg-white text-red-700 border-2 border-red-300 hover:bg-red-50 shadow-sm";

            return `
            <div class="bg-white p-6 rounded-3xl shadow-lg mb-5 border-l-8 border-${color}-500 relative">
                <div class="absolute top-5 right-5 flex gap-3">
                    <button onclick="editLabour('${l.id}', '${l.name}')" class="text-gray-400 hover:text-blue-600 transition text-lg">✏️</button>
                    <button onclick="deleteLabour('${l.id}', '${l.name}')" class="text-gray-400 hover:text-red-600 transition text-lg">🗑️</button>
                </div>
                <div class="mb-5">
                    <h3 class="font-extrabold text-2xl text-gray-800 pr-16 tracking-tight">${l.name}</h3>
                    <span class="inline-block mt-2 text-sm bg-gray-100 text-gray-700 px-3 py-1 rounded-full font-bold shadow-sm border border-gray-300">${daysText}</span>
                </div>
                <div class="grid grid-cols-2 gap-4 bg-gray-50 p-4 rounded-2xl mb-5 border border-gray-200 shadow-inner">
                    <div>
                        <p class="text-gray-500 text-sm uppercase font-extrabold tracking-wider">CASH DUE</p>
                        <p class="font-black text-2xl text-blue-700 mt-1">₹${l.amount_due}</p>
                        <p class="text-sm font-bold text-gray-600 mt-2">Earned: ₹${l.amount_earned}</p>
                        <p class="text-sm font-semibold text-red-500">Taken: ₹${l.amount_taken}</p>
                    </div>
                    <div>
                        <p class="text-gray-500 text-sm uppercase font-extrabold tracking-wider">RICE DUE</p>
                        <p class="font-black text-2xl text-orange-700 mt-1">${l.rice_due} kg</p>
                        <p class="text-sm font-bold text-gray-600 mt-2">Earned: ${l.rice_earned}kg</p>
                        <p class="text-sm font-semibold text-red-500">Taken: ${l.rice_taken}kg</p>
                    </div>
                </div>
                <div class="flex gap-3 mb-4">
                    <button onclick="markAttendance('${l.id}', 'present')" class="flex-1 ${btnPresent} py-3 rounded-xl text-base font-extrabold transition-all duration-200">${presentBtnLabel}</button>
                    <button onclick="markAttendance('${l.id}', 'absent')" class="flex-1 ${btnAbsent} py-3 rounded-xl text-base font-extrabold transition-all duration-200">❌ Absent</button>
                </div>
                <div class="flex gap-3">
                    <button onclick="addTransaction('${l.id}', 'money')" class="flex-1 bg-blue-100 text-blue-800 py-3 rounded-xl text-sm font-extrabold hover:bg-blue-200 transition shadow-sm">💸 Give Advance</button>
                    <button onclick="addTransaction('${l.id}', 'rice')" class="flex-1 bg-orange-100 text-orange-800 py-3 rounded-xl text-sm font-extrabold hover:bg-orange-200 transition shadow-sm">🍚 Give Rice</button>
                </div>
            </div>`;
        }

        async function saveAllTimeRates() {
            const mode = document.getElementById('configAllTimeMode').value;
            const wage = document.getElementById('configAllTimeWage').value; const rice = document.getElementById('configAllTimeRice').value;
            const payload = mode === 'harvest' ? { all_time_wage_harvest: wage, all_time_rice_harvest: rice } : { all_time_wage_non_harvest: wage, all_time_rice_non_harvest: rice };
            await fetch(`${API_URL}/config`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(payload) });
            alert(`All-Time (${mode}) Rates Saved!`); loadData();
        }

        async function saveOccasionalRates() {
            const payload = { occasional_wage: document.getElementById('configOccasionalWage').value, occasional_rice: document.getElementById('configOccasionalRice').value };
            await fetch(`${API_URL}/config`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(payload) });
            alert("Occasional Rates Saved!"); loadData();
        }

        async function addLabour() {
            const name = document.getElementById('newLabourName').value; const type = document.getElementById('newLabourType').value;
            if(!name) return alert("Please enter a name");
            await fetch(`${API_URL}/labours`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({name, type}) });
            document.getElementById('newLabourName').value = ''; loadData(); switchTab(type === 'all_time' ? 'tab-alltime' : 'tab-occasional');
        }

        async function editLabour(id, currentName) {
            const newName = prompt("Enter new name for worker:", currentName);
            if (!newName || newName === currentName) return;
            await fetch(`${API_URL}/labours/${id}`, { method: 'PUT', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({name: newName}) }); loadData();
        }

        async function deleteLabour(id, name) {
            if (!confirm(`⚠️ Delete ${name} and ALL their history forever?`)) return;
            await fetch(`${API_URL}/labours/${id}`, { method: 'DELETE' }); loadData();
        }

        async function markAttendance(id, status) {
            const date = document.getElementById('attendanceDate').value;
            const season = document.getElementById('attendanceSeason').value;
            const allTimeMode = document.getElementById('allTimeMode').value;
            await fetch(`${API_URL}/attendance`, {
                method: 'POST', headers: {'Content-Type': 'application/json'}, 
                body: JSON.stringify({labour_id: id, date, status, season, all_time_mode: allTimeMode})
            });
            loadData(); 
        }

        async function addTransaction(id, type) {
            const amount = prompt(`Enter ${type === 'money' ? 'Cash Amount (₹)' : 'Rice Amount (Kg)'} given:`);
            if(!amount || isNaN(amount)) return;
            await fetch(`${API_URL}/transactions`, { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({labour_id: id, type, amount}) });
            loadData();
        }

        if ('serviceWorker' in navigator) { navigator.serviceWorker.register('sw.js'); }
        let deferredPrompt; window.addEventListener('beforeinstallprompt', (e) => { e.preventDefault(); deferredPrompt = e; document.getElementById('installBtn').classList.remove('hidden'); });
        function installPWA() { if (deferredPrompt) { deferredPrompt.prompt(); deferredPrompt.userChoice.then(() => { deferredPrompt = null; }); } }

        initCalendars(); 
        loadData();
    </script>
</body>
</html>
