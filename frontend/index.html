<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Farm Labour Manager</title>
    <link rel="manifest" href="manifest.json">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Smooth transitions for tabs */
        .tab-content { display: none; animation: fadeIn 0.3s ease-in-out; }
        .tab-content.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="bg-gray-100 text-gray-800 font-sans pb-20">

    <div class="bg-gradient-to-r from-green-700 to-green-900 text-white p-5 shadow-lg flex justify-between items-center rounded-b-2xl mb-4">
        <h1 class="text-2xl font-extrabold tracking-wide">🌾 FarmManager</h1>
        <button onclick="installPWA()" id="installBtn" class="hidden bg-white text-green-800 px-4 py-1 rounded-full font-bold shadow-md text-sm transition hover:bg-gray-100">Install App</button>
    </div>

    <div class="max-w-3xl mx-auto px-4">
        
        <div class="flex space-x-2 bg-white p-2 rounded-xl shadow-sm mb-4 overflow-x-auto">
            <button onclick="switchTab('tab-admin')" id="btn-admin" class="flex-1 py-2 px-3 rounded-lg font-bold text-sm bg-green-100 text-green-800 transition">⚙️ Admin</button>
            <button onclick="switchTab('tab-alltime')" id="btn-alltime" class="flex-1 py-2 px-3 rounded-lg font-bold text-sm text-gray-500 hover:bg-gray-100 transition">👷‍♂️ All-Time</button>
            <button onclick="switchTab('tab-occasional')" id="btn-occasional" class="flex-1 py-2 px-3 rounded-lg font-bold text-sm text-gray-500 hover:bg-gray-100 transition">🌾 Occasional</button>
        </div>

        <div id="globalFilters" class="hidden bg-yellow-50 border border-yellow-200 p-4 rounded-xl shadow-sm mb-4">
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-xs font-bold text-yellow-800 mb-1">📅 Filter Date</label>
                    <input type="date" id="attendanceDate" class="border border-yellow-300 p-2 rounded-lg w-full bg-white shadow-sm">
                </div>
                <div>
                    <label class="block text-xs font-bold text-yellow-800 mb-1">🌤️ Season (Occasional)</label>
                    <select id="attendanceSeason" class="border border-yellow-300 p-2 rounded-lg w-full bg-white shadow-sm">
                        <option value="none">None</option>
                        <option value="boro_chas">Boro Chas</option>
                        <option value="boro_harvest">Boro Harvest</option>
                        <option value="borsa_chas">Borsa Chas</option>
                        <option value="borsa_harvest">Borsa Harvest</option>
                    </select>
                </div>
            </div>
        </div>

        <div id="tab-admin" class="tab-content active">
            <div class="bg-white p-5 rounded-xl shadow-md mb-6 border-t-4 border-blue-500">
                <h2 class="font-bold text-lg mb-3 text-gray-700">➕ Add New Worker</h2>
                <div class="flex flex-col gap-3">
                    <input type="text" id="newLabourName" placeholder="Worker Full Name" class="border p-3 rounded-lg w-full bg-gray-50">
                    <div class="flex gap-2">
                        <select id="newLabourType" class="border p-3 rounded-lg flex-1 bg-gray-50">
                            <option value="all_time">All-Time Worker</option>
                            <option value="occasional">Occasional Worker</option>
                        </select>
                        <button onclick="addLabour()" class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-3 rounded-lg font-bold shadow-md transition">Add</button>
                    </div>
                </div>
            </div>

            <div class="bg-white p-5 rounded-xl shadow-md mb-6 border-t-4 border-green-500">
                <h2 class="font-bold text-lg mb-4 text-gray-700">⚙️ Set Daily Rates</h2>
                <div class="grid grid-cols-1 gap-4 mb-4">
                    <div class="bg-blue-50 p-4 rounded-lg border border-blue-100">
                        <h3 class="font-bold text-blue-800 mb-3">👷‍♂️ All-Time Rates</h3>
                        <div class="flex gap-4">
                            <div class="flex-1">
                                <label class="block text-xs font-bold text-blue-600 uppercase">Wage (₹)</label>
                                <input type="number" id="allTimeWage" class="border p-2 rounded w-full mt-1">
                            </div>
                            <div class="flex-1">
                                <label class="block text-xs font-bold text-blue-600 uppercase">Rice (Kg)</label>
                                <input type="number" id="allTimeRice" class="border p-2 rounded w-full mt-1">
                            </div>
                        </div>
                    </div>
                    
                    <div class="bg-orange-50 p-4 rounded-lg border border-orange-100">
                        <h3 class="font-bold text-orange-800 mb-3">🌾 Occasional Rates</h3>
                        <div class="flex gap-4">
                            <div class="flex-1">
                                <label class="block text-xs font-bold text-orange-600 uppercase">Wage (₹)</label>
                                <input type="number" id="occasionalWage" class="border p-2 rounded w-full mt-1">
                            </div>
                            <div class="flex-1">
                                <label class="block text-xs font-bold text-orange-600 uppercase">Rice (Kg)</label>
                                <input type="number" id="occasionalRice" class="border p-2 rounded w-full mt-1">
                            </div>
                        </div>
                    </div>
                </div>
                <button onclick="saveConfig()" class="bg-green-600 hover:bg-green-700 text-white px-4 py-3 rounded-lg w-full font-bold shadow-md transition">Save All Rates</button>
            </div>
        </div>

        <div id="tab-alltime" class="tab-content">
            <div id="list-alltime"></div>
        </div>

        <div id="tab-occasional" class="tab-content">
            <div id="list-occasional"></div>
        </div>

    </div>

    <script>
        // --- 1. SETUP & CONFIG ---
        const API_URL = "https://labour-management-gopa.onrender.com/api"; 
        
        document.getElementById('attendanceDate').valueAsDate = new Date();
        let allLabours = [];

        // --- 2. TAB LOGIC ---
        function switchTab(tabId) {
            // Hide all tabs
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            // Reset all buttons
            document.querySelectorAll('[id^="btn-"]').forEach(b => {
                b.classList.remove('bg-green-100', 'text-green-800');
                b.classList.add('text-gray-500');
            });
            
            // Show active tab
            document.getElementById(tabId).classList.add('active');
            
            // Highlight active button
            const btnId = tabId.replace('tab-', 'btn-');
            document.getElementById(btnId).classList.remove('text-gray-500');
            document.getElementById(btnId).classList.add('bg-green-100', 'text-green-800');

            // Show/Hide Date Filters based on tab
            const filters = document.getElementById('globalFilters');
            if (tabId === 'tab-admin') {
                filters.classList.add('hidden');
            } else {
                filters.classList.remove('hidden');
            }
        }

        // --- 3. FETCH DATA ---
        async function loadData() {
            try {
                const confRes = await fetch(`${API_URL}/config`);
                const conf = await confRes.json();
                document.getElementById('allTimeWage').value = conf.all_time_wage || 0;
                document.getElementById('allTimeRice').value = conf.all_time_rice || 0;
                document.getElementById('occasionalWage').value = conf.occasional_wage || 0;
                document.getElementById('occasionalRice').value = conf.occasional_rice || 0;

                const labRes = await fetch(`${API_URL}/labours`);
                allLabours = await labRes.json();
                renderLabours();
            } catch (err) {
                console.log("Waiting for connection...");
            }
        }

        // --- 4. RENDER UI ---
        function renderLabours() {
            const allTimeList = document.getElementById('list-alltime');
            const occasionalList = document.getElementById('list-occasional');
            
            const allTime = allLabours.filter(l => l.type === 'all_time');
            const occasional = allLabours.filter(l => l.type === 'occasional');

            allTimeList.innerHTML = allTime.map(createLabourCard).join('') || '<p class="text-center text-gray-500 mt-10">No all-time workers yet.</p>';
            occasionalList.innerHTML = occasional.map(createLabourCard).join('') || '<p class="text-center text-gray-500 mt-10">No occasional workers yet.</p>';
        }

        function createLabourCard(l) {
            const isAllTime = l.type === 'all_time';
            const color = isAllTime ? 'blue' : 'orange';
            
            return `
            <div class="bg-white p-5 rounded-2xl shadow-md mb-4 border-l-8 border-${color}-500 relative">
                <div class="absolute top-4 right-4 flex gap-2">
                    <button onclick="editLabour('${l.id}', '${l.name}')" class="text-gray-400 hover:text-blue-600 transition">✏️</button>
                    <button onclick="deleteLabour('${l.id}', '${l.name}')" class="text-gray-400 hover:text-red-600 transition">🗑️</button>
                </div>

                <div class="mb-4">
                    <h3 class="font-extrabold text-xl text-gray-800 pr-16">${l.name}</h3>
                    <span class="inline-block mt-1 text-xs bg-gray-200 text-gray-700 px-3 py-1 rounded-full font-bold shadow-sm">🗓️ ${l.days_worked} Days Present</span>
                </div>
                
                <div class="grid grid-cols-2 gap-3 text-sm bg-gray-50 p-4 rounded-xl mb-4 border border-gray-100">
                    <div>
                        <p class="text-gray-500 text-xs uppercase font-bold">CASH DUE</p>
                        <p class="font-extrabold text-lg text-blue-600">₹${l.amount_due}</p>
                        <p class="text-xs text-gray-400 mt-1">Earned: ₹${l.amount_earned} | Taken: ₹${l.amount_taken}</p>
                    </div>
                    <div>
                        <p class="text-gray-500 text-xs uppercase font-bold">RICE DUE</p>
                        <p class="font-extrabold text-lg text-orange-600">${l.rice_due} kg</p>
                        <p class="text-xs text-gray-400 mt-1">Earned: ${l.rice_earned}kg | Taken: ${l.rice_taken}kg</p>
                    </div>
                </div>

                <div class="flex gap-2 mb-3">
                    <button onclick="markAttendance('${l.id}', 'present')" class="flex-1 bg-green-500 hover:bg-green-600 text-white py-2 rounded-lg text-sm font-bold shadow transition">✔️ Mark Present</button>
                    <button onclick="markAttendance('${l.id}', 'absent')" class="flex-1 bg-red-400 hover:bg-red-500 text-white py-2 rounded-lg text-sm font-bold shadow transition">❌ Mark Absent</button>
                </div>
                
                <div class="flex gap-2">
                    <button onclick="addTransaction('${l.id}', 'money')" class="flex-1 border-2 border-blue-200 text-blue-700 py-2 rounded-lg text-sm font-bold hover:bg-blue-50 transition">💸 Give Advance</button>
                    <button onclick="addTransaction('${l.id}', 'rice')" class="flex-1 border-2 border-orange-200 text-orange-700 py-2 rounded-lg text-sm font-bold hover:bg-orange-50 transition">🍚 Give Rice</button>
                </div>
            </div>`;
        }

        // --- 5. DATA ACTIONS ---
        async function saveConfig() {
            const payload = {
                all_time_wage: document.getElementById('allTimeWage').value,
                all_time_rice: document.getElementById('allTimeRice').value,
                occasional_wage: document.getElementById('occasionalWage').value,
                occasional_rice: document.getElementById('occasionalRice').value
            };
            await fetch(`${API_URL}/config`, {
                method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify(payload)
            });
            alert("All Rates Saved Successfully!");
            loadData();
        }

        async function addLabour() {
            const name = document.getElementById('newLabourName').value;
            const type = document.getElementById('newLabourType').value;
            if(!name) return alert("Please enter a name");
            
            await fetch(`${API_URL}/labours`, {
                method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({name, type})
            });
            document.getElementById('newLabourName').value = '';
            loadData();
            // Jump to the tab where we just added the worker
            switchTab(type === 'all_time' ? 'tab-alltime' : 'tab-occasional');
        }

        // NEW: Edit & Delete Functions
        async function editLabour(id, currentName) {
            const newName = prompt("Enter new name for worker:", currentName);
            if (!newName || newName === currentName) return;

            await fetch(`${API_URL}/labours/${id}`, {
                method: 'PUT', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({name: newName})
            });
            loadData();
        }

        async function deleteLabour(id, name) {
            const confirmDelete = confirm(`⚠️ WARNING: Are you sure you want to completely delete ${name}? \n\nThis will erase ALL their attendance and payment history permanently.`);
            if (!confirmDelete) return;

            await fetch(`${API_URL}/labours/${id}`, { method: 'DELETE' });
            loadData();
        }

        async function markAttendance(id, status) {
            const date = document.getElementById('attendanceDate').value;
            const season = document.getElementById('attendanceSeason').value;
            await fetch(`${API_URL}/attendance`, {
                method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({labour_id: id, date, status, season})
            });
            loadData();
        }

        async function addTransaction(id, type) {
            const amount = prompt(`Enter ${type === 'money' ? 'Cash Amount (₹)' : 'Rice Amount (Kg)'} given:`);
            if(!amount || isNaN(amount)) return;
            await fetch(`${API_URL}/transactions`, {
                method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({labour_id: id, type, amount})
            });
            loadData();
        }

        if ('serviceWorker' in navigator) { navigator.serviceWorker.register('sw.js'); }
        let deferredPrompt;
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            document.getElementById('installBtn').classList.remove('hidden');
        });
        function installPWA() {
            if (deferredPrompt) { deferredPrompt.prompt(); deferredPrompt.userChoice.then(() => { deferredPrompt = null; }); }
        }

        loadData();
    </script>
</body>
</html>
